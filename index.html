<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Hot 21 - Final Version</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Hot 21">
    <link rel="apple-touch-icon" href="icon.png">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('sw.js')
            .then(reg => console.log('Service Worker Registered!'))
            .catch(err => console.log('Service Worker Failed', err));
        });
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #ff3e3e; 
            --bg: #0b0b0b; 
            --card-bg: #1a1a1a; 
            --gold: #ffd700; 
            --victory-red: #ff0000; 
            --win-green: #00ff00;
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--bg); 
            color: white; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            text-transform: uppercase;
            overflow: hidden;
            touch-action: manipulation;
        }

        .app { width: 100%; max-width: 500px; padding: 20px; text-align: center; box-sizing: border-box; transition: opacity 0.8s ease; position: relative; }
        
        .round-counter { position: absolute; top: 10px; right: 20px; font-size: 0.7rem; color: #555; letter-spacing: 1px; }

        h1 { font-size: 3rem; margin: 0; font-weight: 900; color: white; text-shadow: 0 0 20px rgba(255, 0, 0, 0.6); }
        .subtitle { color: #555; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 20px; }

        .streak-board { display: flex; justify-content: space-between; margin-bottom: 30px; gap: 15px; }
        .streak-player { background: var(--card-bg); padding: 20px 10px; border-radius: 20px; border: 2px solid #333; flex: 1; transition: 0.4s; font-size: 1.1rem; font-weight: 900; color: #666; }
        .active-player { border-color: var(--gold); color: white; background: #252525; box-shadow: 0 0 15px rgba(255, 215, 0, 0.3); transform: scale(1.05); }
        
        .streak-victory { 
            border-color: var(--win-green) !important; 
            color: var(--win-green) !important; 
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6) !important; 
            transform: scale(1.1);
            animation: greenPulse 0.4s infinite alternate;
        }
        @keyframes greenPulse { from { opacity: 1; } to { opacity: 0.7; } }

        .winner-glow { animation: victoryPulse 1s ease-in-out infinite; border-color: var(--victory-red) !important; box-shadow: 0 0 40px rgba(255, 0, 0, 0.7) !important; color: white; }

        @keyframes victoryPulse { 0%, 100% { transform: scale(1.08); } 50% { transform: scale(1.02); } }

        .dots { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
        .dot { width: 14px; height: 14px; border-radius: 50%; background: #222; border: 1px solid #444; }
        .dot.filled { background: var(--victory-red); box-shadow: 0 0 12px var(--victory-red); border: none; }
        .streak-victory .dot.filled { background: var(--win-green); box-shadow: 0 0 15px var(--win-green); }

        .game-area { background: radial-gradient(circle, #2a0000 0%, #000 100%); padding: 25px 15px; border-radius: 35px; border: 2px solid #333; margin-bottom: 20px; position: relative; }
        .score-tag { display: inline-block; color: var(--gold); font-size: 1.4rem; margin-left: 10px; }
        
        .cards-container { display: flex; justify-content: center; min-height: 150px; margin: 15px 0; perspective: 1000px; padding: 10px; }
        .active-hand-glow { background: rgba(255, 215, 0, 0.05); box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.1); border-radius: 20px; }

        .playing-card { 
            width: 95px; height: 135px; background-size: cover; border-radius: 8px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.5); margin: 0 -25px; border: 1px solid #000; 
            background-color: #fff; opacity: 0;
            animation: cardFlyIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cardFlyIn {
            0% { transform: translateY(250px) rotate(45deg) scale(0.5); opacity: 0; }
            100% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
        }

        .status-msg { height: 50px; font-size: 1.4rem; margin: 15px 0; color: var(--gold); font-weight: 900; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 20px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 1.3rem; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.95); }
        .btn-main { background: var(--primary); color: white; box-shadow: 0 5px 0 #9b1a1a; }
        .btn-sub { background: white; color: black; flex: 1; box-shadow: 0 5px 0 #ccc; }

        #reward-screen { 
            display: none; position: fixed; inset: 0; background: var(--bg); z-index: 10000; 
            border: 10px solid var(--victory-red); flex-direction: column; align-items: center; 
            justify-content: center; opacity: 0; transition: opacity 0.6s; 
        }

        #reward-title { 
            font-size: 4rem; color: var(--gold); margin-bottom: 10px;
            text-shadow: 0 0 25px var(--gold); animation: textGlow 1s infinite alternate; 
        }
        @keyframes textGlow { from { transform: scale(1); text-shadow: 0 0 10px var(--gold); } to { transform: scale(1.1); text-shadow: 0 0 30px var(--gold); } }

        #reward-task { font-size: 1.6rem; color: white; margin: 20px; font-weight: 900; text-align: center; line-height: 1.2; }
        #timer { font-size: 6rem; font-weight: 900; color: var(--victory-red); text-shadow: 0 0 20px rgba(255,0,0,0.4); }

        #reveal-container { position: absolute; inset: 0; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 10010; backdrop-filter: blur(25px); transition: 0.8s; }
        
        #reveal-btn { background: var(--gold); padding: 25px 50px; border-radius: 20px; font-size: 1.6rem; box-shadow: 0 10px 0 #b8860b; color: black; }

        .balanced-intense-shake { animation: vibe 0.08s infinite alternate, flashPanic 0.15s infinite; box-shadow: 0 0 60px var(--victory-red) !important; }
        @keyframes vibe { from { transform: translate(-3px, -2px) rotate(-1deg); } to { transform: translate(3px, 2px) rotate(1deg); } }
        @keyframes flashPanic { 0%, 100% { background: var(--gold); } 50% { background: var(--victory-red); color: white; } }
        
        .btn-fall { animation: fallSmooth 0.9s forwards cubic-bezier(0.55, 0.055, 0.675, 0.19); }
        @keyframes fallSmooth { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(1000px) rotate(45deg); opacity: 0; } }

        #reward-content { display: none; flex-direction: column; align-items: center; opacity: 0; transform: scale(0.8); transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .content-show { display: flex !important; opacity: 1 !important; transform: scale(1) !important; }

        .btn-timer-start { background: var(--victory-red); color: white; padding: 15px 40px; border-radius: 50px; margin-top: 15px; box-shadow: 0 6px 0 #9b1a1a; font-size: 1.1rem; }
        .btn-done { background: white; color: black; padding: 15px 50px; border-radius: 50px; margin-top: 15px; box-shadow: 0 6px 0 #ccc; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="app" id="main-app">
    <div class="round-counter">ROUNDS: <span id="round-val">0</span></div>
    <h1>HOT 21</h1>
    <div class="subtitle">STREAK CHALLENGE</div>

    <div class="streak-board">
        <div id="streak-p1" class="streak-player"><span>PLAYER 1</span><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
        <div id="streak-p2" class="streak-player"><span>PLAYER 2</span><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
    </div>

    <div class="game-area">
        <div style="font-size: 0.7rem; color: #666;">PLAYER 2 <span class="score-tag" id="p2-score">0</span></div>
        <div id="p2-cards" class="cards-container"></div>
        <div style="border-top: 1px solid #222; margin: 15px 40px;"></div>
        <div style="font-size: 0.7rem; color: #666;">PLAYER 1 <span class="score-tag" id="p1-score">0</span></div>
        <div id="p1-cards" class="cards-container"></div>
        <div id="status" class="status-msg">READY?</div>
    </div>

    <div class="controls">
        <button id="deal-btn" class="btn-main" onclick="startRound()">DEAL CARDS</button>
        <div id="game-btns" style="display:none; gap:10px; width:100%;">
            <button id="hit-btn" class="btn-sub" onclick="hit()">HIT</button>
            <button id="stand-btn" class="btn-sub" onclick="stand()">STAND</button>
        </div>
    </div>
</div>

<div id="reward-screen">
    <div id="reward-title">JACKPOT!</div>
    <div id="reveal-container">
        <button id="reveal-btn" onclick="executeReveal()">REVEAL YOUR TASK</button>
    </div>
    <div id="reward-content">
        <div id="reward-task">...</div>
        <div id="timer">00:00</div>
        <button id="timer-start-btn" class="btn-timer-start" onclick="beginTimer()">START TIMER</button>
        <button id="done-btn" class="btn-done" style="display:none;" onclick="closeReward()">I'M DONE</button>
    </div>
</div>

<script>
    const cardBaseURL = "https://deckofcardsapi.com/static/img/";
    const suits = ['H', 'D', 'C', 'S'], vals = ['2','3','4','5','6','7','8','9','0','J','Q','K','A'];
    let deck = [], p1Hand = [], p2Hand = [], streaks = { p1: 0, p2: 0 }, currentPlayer = 1, gameOver = false, roundWinner = null;
    let roundCount = 0;
    let currentTimeLeft = 0;
    let rewardInterval;

    const tasks = [
        { text: "YOUR MISSION IS STANDING DOGGY STYLE (NOT ON BED)!", time: 300 },
        { text: "YOUR MISSION IS 69 POSITION!", time: 300 },
        { text: "YOUR MISSION IS MISSIONARY SEX!", time: 300 },
        { text: "YOUR MISSION IS COWGIRL SEX!", time: 300 },
        { text: "YOUR MISSION IS SEX WITH THE GIRL'S LEGS ON THE BOY'S SHOULDERS!", time: 300 },
        { text: "YOUR MISSION IS SEX ON A CHAIR!", time: 300 },
        { text: "YOUR MISSION IS HANDCUFF THE LOSER AND DO AS YOU WISH!", time: 300 },
        { text: "YOUR MISSION IS DOGGY STYLE ON THE BED!", time: 300 },
        { text: "YOUR MISSION IS BLINDFOLD THE LOSER AND DO AS YOU WISH!", time: 300 },
        { text: "YOUR MISSION IS MASSAGE THE WINNER!", time: 300 },
        { text: "YOUR MISSION IS BLOWJOB TO THE WINNER!", time: 300 },
        { text: "YOUR MISSION IS KISS THE WINNER'S NECK!", time: 180 },
        { text: "YOUR MISSION IS HANDJOB TO THE WINNER!", time: 180 },
        { text: "YOUR MISSION IS TAKE AN ALCOHOL SHOT!", time: 60 },
        { text: "YOUR MISSION IS HICKEY ON THE LOSER'S CHEST!", time: 180 },
        { text: "YOUR MISSION IS SPANK THE LOSER'S ASS!", time: 60 }
    ];

    function createDeck() { 
        deck = []; 
        suits.forEach(s => vals.forEach(v => deck.push({v, s}))); 
        deck.sort(() => Math.random() - 0.5); 
    }

    function renderHand(id, hand) {
        const div = document.getElementById(`${id}-cards`);
        const currentInDom = div.querySelectorAll('.playing-card').length;
        hand.forEach((c, i) => {
            if (i >= currentInDom) {
                const img = document.createElement('div');
                img.className = 'playing-card';
                img.style.backgroundImage = `url('${cardBaseURL}${c.v}${c.s}.png')`;
                img.style.zIndex = i;
                img.style.animationDelay = `${(i - currentInDom) * 0.15}s`;
                div.appendChild(img);
            }
        });
    }

    function startRound() {
        if (document.getElementById('deal-btn').disabled) return;
        roundCount++; gameOver = false; roundWinner = null;
        createDeck();
        p1Hand = []; p2Hand = [];
        document.getElementById('p1-cards').innerHTML = '';
        document.getElementById('p2-cards').innerHTML = '';
        
        p1Hand = [deck.pop(), deck.pop()];
        p2Hand = [deck.pop(), deck.pop()];
        currentPlayer = 1;
        document.getElementById('deal-btn').style.display = 'none';
        document.getElementById('game-btns').style.display = 'flex';
        document.getElementById('status').textContent = "PLAYER 1 TURN";
        updateUI();
    }

    function updateUI() {
        renderHand('p1', p1Hand);
        renderHand('p2', p2Hand);
        document.getElementById('p1-score').textContent = getVal(p1Hand);
        document.getElementById('p2-score').textContent = getVal(p2Hand);
        document.getElementById('round-val').textContent = roundCount;

        document.getElementById('p1-cards').classList.toggle('active-hand-glow', currentPlayer === 1 && !gameOver);
        document.getElementById('p2-cards').classList.toggle('active-hand-glow', currentPlayer === 2 && !gameOver);

        ['p1', 'p2'].forEach(p => {
            const el = document.getElementById(`streak-${p}`);
            const dots = el.querySelectorAll('.dot');
            dots.forEach((d, i) => d.className = i < streaks[p] ? 'dot filled' : 'dot');
            el.classList.toggle('active-player', (p === 'p1' && currentPlayer === 1 && !gameOver) || (p === 'p2' && currentPlayer === 2 && !gameOver));
            el.classList.toggle('winner-glow', gameOver && roundWinner === p && streaks[p] < 3);
        });
    }

    function getVal(hand) {
        let val = 0, aces = 0;
        hand.forEach(c => { if (['J','Q','K','0'].includes(c.v)) val += 10; else if (c.v === 'A') { aces++; val += 11; } else val += parseInt(c.v); });
        while (val > 21 && aces > 0) { val -= 10; aces--; }
        return val;
    }

    function hit() {
        if (gameOver) return;
        const targetHand = currentPlayer === 1 ? p1Hand : p2Hand;
        targetHand.push(deck.pop());
        updateUI();
        if (getVal(targetHand) > 21) endRound(currentPlayer === 1 ? 'p2' : 'p1', `${currentPlayer === 1 ? 'P1' : 'P2'} BUST!`);
    }

    function stand() {
        if (currentPlayer === 1) { 
            currentPlayer = 2; 
            document.getElementById('status').textContent = "PLAYER 2 TURN"; 
            updateUI(); 
        } else {
            const s1 = getVal(p1Hand), s2 = getVal(p2Hand);
            if (s1 > s2) endRound('p1'); else if (s2 > s1) endRound('p2'); else endRound('draw');
        }
    }

    function endRound(winner, msg) {
        gameOver = true; roundWinner = winner;
        const statusEl = document.getElementById('status');
        if (winner === 'draw') statusEl.textContent = "DRAW!";
        else {
            statusEl.textContent = msg || `PLAYER ${winner === 'p1' ? '1' : '2'} WON!`;
            streaks[winner === 'p1' ? 'p2' : 'p1'] = 0; streaks[winner]++;
        }
        
        updateUI();

        if (winner !== 'draw' && streaks[winner] === 3) {
            document.getElementById(`streak-${winner}`).classList.add('streak-victory');
            document.getElementById('deal-btn').disabled = true;
            setTimeout(() => showReward(winner), 1200);
        } else {
            document.getElementById('deal-btn').style.display = 'block';
            document.getElementById('game-btns').style.display = 'none';
        }
    }

    function showReward(winner) {
        const screen = document.getElementById('reward-screen');
        const task = tasks[Math.floor(Math.random() * tasks.length)];
        currentTimeLeft = task.time;
        document.getElementById('reward-task').textContent = task.text;
        document.getElementById('timer').textContent = `${Math.floor(task.time/60).toString().padStart(2,'0')}:${(task.time%60).toString().padStart(2,'0')}`;
        document.getElementById('reveal-container').style.display = 'flex';
        document.getElementById('reveal-container').style.opacity = '1';
        document.getElementById('main-app').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('main-app').style.display = 'none';
            screen.style.display = 'flex';
            setTimeout(() => screen.style.opacity = '1', 50);
        }, 800);
    }

    function executeReveal() {
        const btn = document.getElementById('reveal-btn');
        btn.classList.add('balanced-intense-shake');
        setTimeout(() => {
            btn.classList.remove('balanced-intense-shake');
            btn.classList.add('btn-fall');
            setTimeout(() => {
                document.getElementById('reveal-container').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('reveal-container').style.display = 'none';
                    document.getElementById('reward-content').classList.add('content-show');
                }, 600);
            }, 300);
        }, 1800);
    }

    function beginTimer() {
        document.getElementById('timer-start-btn').style.display = 'none';
        document.getElementById('done-btn').style.display = 'block';
        if(rewardInterval) clearInterval(rewardInterval);
        rewardInterval = setInterval(() => {
            if (--currentTimeLeft < 0) { 
                clearInterval(rewardInterval); 
                document.getElementById('timer').textContent = "DONE!"; 
            } else { 
                document.getElementById('timer').textContent = `${Math.floor(currentTimeLeft/60).toString().padStart(2,'0')}:${(currentTimeLeft%60).toString().padStart(2,'0')}`; 
            }
        }, 1000);
    }

    function closeReward() {
        // איפוס לוגי מלא במקום רענון דף שגורם לתקיעות
        clearInterval(rewardInterval);
        streaks = { p1: 0, p2: 0 };
        roundCount = 0;
        p1Hand = [];
        p2Hand = [];
        gameOver = false;
        roundWinner = null;
        currentPlayer = 1;

        // איפוס הממשק של המשחק הראשי
        document.getElementById('p1-cards').innerHTML = '';
        document.getElementById('p2-cards').innerHTML = '';
        document.getElementById('p1-score').textContent = '0';
        document.getElementById('p2-score').textContent = '0';
        document.getElementById('round-val').textContent = '0';
        document.getElementById('status').textContent = 'READY?';
        document.getElementById('deal-btn').style.display = 'block';
        document.getElementById('deal-btn').disabled = false;
        document.getElementById('game-btns').style.display = 'none';
        
        // הסרת מחלקות ניצחון
        document.getElementById('streak-p1').classList.remove('streak-victory', 'winner-glow');
        document.getElementById('streak-p2').classList.remove('streak-victory', 'winner-glow');
        
        // איפוס מסך הפרס לשימוש הבא
        document.getElementById('reward-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('reward-screen').style.display = 'none';
            document.getElementById('reveal-container').style.display = 'flex';
            document.getElementById('reveal-container').style.opacity = '1';
            document.getElementById('reward-content').classList.remove('content-show');
            document.getElementById('reveal-btn').classList.remove('btn-fall');
            document.getElementById('timer-start-btn').style.display = 'block';
            document.getElementById('done-btn').style.display = 'none';
            
            // הצגת האפליקציה מחדש
            document.getElementById('main-app').style.display = 'block';
            setTimeout(() => {
                document.getElementById('main-app').style.opacity = '1';
                updateUI();
            }, 50);
        }, 600);
    }
</script>
</body>
</html>
